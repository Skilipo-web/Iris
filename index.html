<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris | Skilipo-web</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; background: #0f172a; color: white; text-align: center; overflow: hidden;
        }

        /* L'effet de Flash au démarrage */
        .flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, #8a2be2, #da70d6);
            z-index: 9999;
            animation: flashOut 1.2s cubic-bezier(0.8, 0, 0.2, 1) forwards;
        }

        /* Animation d'entrée du contenu */
        .content { animation: fadeInContent 1.5s ease-out forwards; opacity: 0; }

        .logo-img { 
            width: 180px; height: 180px; object-fit: cover; border-radius: 50%;
            border: 4px solid #8a2be2; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
            animation: entranceLogo 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55) forwards, 
                       pulse 3s infinite ease-in-out 1.5s;
        }

        h1 { 
            font-size: 4.5rem; font-weight: 800; margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #da70d6);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        p { font-size: 1.3rem; max-width: 650px; opacity: 0.8; margin-bottom: 40px; padding: 0 20px; }

        .btn {
            padding: 18px 45px; background: #8a2be2; color: white;
            text-decoration: none; font-weight: 700; border-radius: 50px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block; box-shadow: 0 10px 25px rgba(138, 43, 226, 0.3);
        }

        .btn:hover { background: #da70d6; transform: scale(1.1) rotate(2deg); box-shadow: 0 15px 35px rgba(218, 112, 214, 0.5); }

        /* LES ANIMATIONS */
        @keyframes flashOut {
            0% { transform: scaleX(1); transform-origin: left; }
            100% { transform: scaleX(0); transform-origin: right; }
        }

        @keyframes fadeInContent {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes entranceLogo {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(138, 43, 226, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(138, 43, 226, 0.8); transform: scale(1.03); }
        }
   body::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(circle, #ffffff 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.1;
    z-index: -1;
    animation: starsMove 100s linear infinite;
}
@keyframes starsMove {
    from { background-position: 0 0; }
    to { background-position: 1000px 1000px; }
}
 </style>
</head>
<body>
    <!-- Le flash de couleur -->
    <div class="flash-overlay"></div>

    <div class="content">
        <img src="https://dicebear.com" alt="Logo Iris" class="logo-img">

        <h1>Iris</h1>
        <p>L'expérience web réinventée. Une interface d'exception, une fluidité absolue, signée <strong>Skilipo-web</strong>.</p>
        <a href="#" class="btn">Explorer l'univers</a>
    </div>
</body>
</html>
